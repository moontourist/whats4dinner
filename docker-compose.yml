services:
  whats4dinner:
    container_name: whats4dinner
    build: .
    # Once published you can swap `build: .` for an image, e.g.
    # image: ghcr.io/yourname/whats4dinner:latest
    ports:
      # host:container — change the LEFT number if 8137 is also taken.
      # The app always listens on 8080 inside the container; don't change the right side.
      - "8137:8080"
    environment:
      # Set this to your timezone so the daily pick fires at the right 2 PM.
      TZ: America/Los_Angeles
      PICK_HOUR: "14"   # 24h clock — 14 = 2 PM
      PICK_MINUTE: "0"
    volumes:
      - whats4dinner-data:/data
    restart: unless-stopped

volumes:
  whats4dinner-data:
